<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PosteriorDB Explorer</title>
<style>
:root{
--stan-orange:#e36f1e;
--stan-dark:#1e1e1e;
--stan-panel:#262626;
--stan-panel-2:#2f2f2f;
--stan-border:#3d3d3d;
--stan-text:#f3f3f3;
--stan-muted:#bdbdbd;
--stan-accent:#ff8c3a;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
background:#181818;
color:var(--stan-text);
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

h1{
margin:0 0 6px 0;
font-weight:700;
color:var(--stan-orange);
}

.sub{
color:var(--stan-muted);
margin-bottom:24px;
}

.grid{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
}

.card{
background:var(--stan-panel);
border:1px solid var(--stan-border);
border-radius:12px;
padding:16px;
}

label{
font-size:0.9rem;
color:var(--stan-muted);
display:block;
margin-bottom:6px;
}

input,select,button{
width:100%;
padding:10px;
background:var(--stan-panel-2);
color:var(--stan-text);
border:1px solid var(--stan-border);
border-radius:8px;
font-size:0.95rem;
}

button{
margin-top:12px;
background:var(--stan-orange);
border:none;
font-weight:600;
cursor:pointer;
}

button:hover{
background:var(--stan-accent);
}

.links{
display:flex;
flex-wrap:wrap;
gap:8px;
margin:12px 0;
}

.links a{
background:var(--stan-panel-2);
border:1px solid var(--stan-border);
padding:6px 10px;
border-radius:20px;
text-decoration:none;
color:var(--stan-text);
font-size:0.85rem;
}

.meta{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:14px;
}

.meta-item{
background:var(--stan-panel-2);
padding:8px;
border-radius:8px;
border:1px solid var(--stan-border);
}

.meta-item .k{
font-size:0.75rem;
color:var(--stan-muted);
margin-bottom:3px;
}

pre{
background:#111;
border:1px solid var(--stan-border);
padding:14px;
border-radius:10px;
overflow:auto;
font-size:0.85rem;
}

.codebox{
margin-top:12px;
}

.codebox h3{
margin:12px 0 6px 0;
font-size:0.95rem;
color:var(--stan-orange);
}

.small{
font-size:0.85rem;
color:var(--stan-muted);
margin-top:10px;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">

<h1>PosteriorDB Explorer</h1>
<div class="sub">Browse models, inspect metadata, and preview model implementations.</div>

<div class="grid">

<section class="card">

<label>Search model</label>
<input id="search" placeholder="eight_schools, radon, sir...">

<label style="margin-top:10px">Select model</label>
<select id="modelSelect"></select>

<button id="reloadBtn">Reload models</button>

<div class="small">Data files are detected but never downloaded.</div>

</section>

<section class="card">

<h2 id="title">Model</h2>
<div id="summary" class="sub"></div>

<div id="links" class="links"></div>

<div id="meta" class="meta"></div>

<h3 style="color:var(--stan-orange)">Model JSON</h3>
<pre id="jsonView"></pre>

<div class="codebox">
<h3>Model implementation</h3>
<pre id="codeView"></pre>
</div>

</section>

</div>

</div>

<script>

const owner="stan-dev"
const repo="posteriordb"
const branch="master"

const infoDir="posterior_database/models/info"
const rawBase=`https://raw.githubusercontent.com/${owner}/${repo}/${branch}`
const api=`https://api.github.com/repos/${owner}/${repo}/contents/${infoDir}?ref=${branch}`

const search=document.getElementById("search")
const select=document.getElementById("modelSelect")
const reload=document.getElementById("reloadBtn")

const jsonView=document.getElementById("jsonView")
const codeView=document.getElementById("codeView")
const title=document.getElementById("title")
const summary=document.getElementById("summary")
const meta=document.getElementById("meta")
const links=document.getElementById("links")

let models=[]
let filtered=[]

function nameFromFile(file){
return file.replace(".info.json","")
}

function renderList(){
const q=search.value.toLowerCase()
filtered=models.filter(m=>m.name.includes(q))

select.innerHTML=""

filtered.forEach(m=>{
const o=document.createElement("option")
o.value=m.url
o.textContent=m.name
select.appendChild(o)
})

if(filtered.length) loadModel(filtered[0])
}

function renderMeta(info){
const items=[
["Added",info.added_date],
["Licence",info.licence],
["Added by",info.added_by]
]

meta.innerHTML=items.map(([k,v])=>`
<div class="meta-item">
<div class="k">${k}</div>
<div>${v||"—"}</div>
</div>
`).join("")
}

function renderLinks(info){
links.innerHTML=""

if(info.model_implementations){
Object.entries(info.model_implementations).forEach(([lang,obj])=>{
if(obj.model_code){
const path="posterior_database/"+obj.model_code
const a=document.createElement("a")
a.href=`${rawBase}/${path}`
a.target="_blank"
a.textContent=`${lang} code`
links.appendChild(a)
}
})
}

if(info.data){
const a=document.createElement("a")
a.textContent="data available"
a.title="dataset exists but not downloaded"
links.appendChild(a)
}
}

async function loadCode(path){
if(!path){
codeView.textContent="No implementation found"
return
}

const url=`${rawBase}/${path}`

try{
const r=await fetch(url)
const text=await r.text()

codeView.textContent=text.slice(0,4000)
}catch{
codeView.textContent="Could not load code"
}
}

async function loadModel(m){

const r=await fetch(m.url)
const info=await r.json()

jsonView.textContent=JSON.stringify(info,null,2)

summary.textContent=info.description||""

title.textContent=info.name||m.name

renderMeta(info)
renderLinks(info)

let codePath=null

if(info.model_implementations){

if(info.model_implementations.stan)
codePath="posterior_database/"+info.model_implementations.stan.model_code

else if(info.model_implementations.pymc)
codePath="posterior_database/"+info.model_implementations.pymc.model_code

}

loadCode(codePath)

}

async function loadModels(){

const r=await fetch(api)
const items=await r.json()

models=items
.filter(x=>x.name.endsWith(".info.json"))
.map(x=>({
name:nameFromFile(x.name),
url:x.download_url
}))
.sort((a,b)=>a.name.localeCompare(b.name))

renderList()
}

search.addEventListener("input",renderList)

select.addEventListener("change",()=>{
const m=filtered[select.selectedIndex]
loadModel(m)
})

reload.onclick=loadModels

loadModels()

</script>

</body>
</html>
