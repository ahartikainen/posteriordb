name: Build and Deploy PosteriorDB Explorer

on:
  push:
    branches:
      - main
      - master
    paths:
      - "posterior_database/**"
      - "scripts/build_index.py"
      - "docs/index.html"
      - ".github/workflows/build-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build static index files
        run: python scripts/build_index.py

      - name: Verify generated files
        run: |
          test -f docs/data/site-index.json
          echo "site-index exists"
          find docs/data -maxdepth 2 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
